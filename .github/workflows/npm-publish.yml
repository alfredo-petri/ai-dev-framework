name: Publish to npm

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get current version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: published
        run: |
          if npm view @alfredo-petri/ai-dev-framework@${{ steps.version.outputs.value }} version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.value }} already on npm. Skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify CHANGELOG has entry for current version
        if: steps.published.outputs.skip == 'false'
        run: |
          if ! grep -q "## v${{ steps.version.outputs.value }}" CHANGELOG.md; then
            echo "❌ CHANGELOG.md has no entry for v${{ steps.version.outputs.value }}"
            echo "Add '## v${{ steps.version.outputs.value }}' to CHANGELOG.md before publishing."
            exit 1
          fi
          echo "✓ CHANGELOG entry found for v${{ steps.version.outputs.value }}"

      - name: Verify README is not empty
        if: steps.published.outputs.skip == 'false'
        run: |
          if [ ! -s README.md ]; then
            echo "❌ README.md is empty or missing"
            exit 1
          fi
          echo "✓ README.md present ($(wc -l < README.md) lines)"

      - name: Publish to npm
        if: steps.published.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and push git tag
        if: steps.published.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Summary
        if: steps.published.outputs.skip == 'false'
        run: echo "✓ Published @alfredo-petri/ai-dev-framework@${{ steps.version.outputs.value }} and tagged v${{ steps.version.outputs.value }}"
